version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: acme_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acme_salary_db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: acme_salary_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/acme_salary_db?schema=public
    ports:
      - "3000:3000"
    command: sh -c "yarn workspace backend prisma migrate deploy ; node backend/dist/index.js"

volumes:
  postgres_data_prod:
